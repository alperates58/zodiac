  <link rel="stylesheet" href="style.css?v=responsive-20260713b">
  <style>
    .offline-container {
      max-width: 600px;
      margin: 150px auto 80px;
      padding: 3rem 2rem;
      text-align: center;
      background: var(--glass-bg, rgba(255, 255, 255, 0.03));
      border: 1px solid var(--glass-border, rgba(255, 255, 255, 0.08));
      border-radius: 8px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .offline-icon {
      font-size: 5rem;
      color: var(--gold, #d4af37);
      margin-bottom: 2rem;
      display: inline-block;
      animation: pulse 2s infinite alternate;
    }
    .offline-container h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      color: #fff;
    }
    .offline-container p {
      color: var(--muted, #cbd5e1);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .retry-btn {
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #d4af37, #967012);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #030610;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
    }
  </style>
  </head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span>✦</span> ZODYAK ATLASI</a>
  </header>

  <main class="offline-container">
    <div class="star-field" aria-hidden="true"></div>
    <span class="offline-icon">🌌</span>
    <h1>Çevrimdışısınız</h1>
    <p>
      Şu anda internet bağlantınız bulunmadığı için bu sayfaya erişilemiyor. 
      Önceden ziyaret ettiğiniz bazı sayfaları çevrimdışı görüntülemeye devam edebilirsiniz.
    </p>
    <button onclick="window.location.reload()" class="retry-btn">Tekrar Dene</button>
  </main>

  <footer class="detail-footer" style="padding: 4rem 0; text-align: center;">
