<!DOCTYPE html>
<html>
<body>
  <iframe id="testFrame" src="../dogum-haritasi.html" style="width:1000px; height:1000px; border:none;"></iframe>
  <div id="log" style="font-family:monospace; white-space:pre-wrap; margin-top:20px; padding:10px; border:1px solid #ccc;">Running test...</div>
  <script>
    window.onload = function() {
      // Wait for iframe content to load
      setTimeout(function() {
        try {
          var iframe = document.getElementById("testFrame");
          var doc = iframe.contentDocument || iframe.contentWindow.document;
          var win = iframe.contentWindow;

          // Populate inputs for Tromso (15.06.1985 14:30, UTC+2)
          doc.getElementById("calcBirthDate").value = "1985-06-15";
          doc.getElementById("calcBirthTime").value = "14:30";
          doc.getElementById("calcDST").checked = false; // Offset will be tz = 2.0 directly

          // Append Tromso to city database temporarily
          var cityIdx = win.cityDatabase.length;
          win.cityDatabase.push({
            name: "Tromso",
            country: "Norway",
            lat: 69.65,
            lng: 18.95,
            tz: 2.0
          });

          // Append option to dropdown
          var opt = doc.createElement("option");
          opt.value = cityIdx;
          opt.textContent = "Tromso (Norway)";
          doc.getElementById("calcCity").appendChild(opt);
          doc.getElementById("calcCity").value = cityIdx;

          // Trigger calculation
          win.calculateBigThree();

          // Wait for calculation to render
          setTimeout(function() {
            try {
              var sunName = doc.getElementById("sunName").innerText;
              var moonName = doc.getElementById("moonName").innerText;
              var risingSignName = doc.getElementById("risingSignName").innerText;
              var engineName = doc.getElementById("debugEngineName").innerText;
              var tzDisclaimerStyle = doc.getElementById("timezoneDisclaimer").style.display;
              var latDisclaimerStyle = doc.getElementById("latitudeDisclaimer").style.display;

              var out = "VERIFICATION RESULTS:\n";
              out += "---------------------\n";
              out += "Calculation Engine: " + engineName + "\n";
              out += "Sun: " + sunName + "\n";
              out += "Moon: " + moonName + "\n";
              out += "Ascendant (Rising): " + risingSignName + "\n";
              out += "Timezone Disclaimer Display: " + tzDisclaimerStyle + "\n";
              out += "Latitude Disclaimer Display: " + latDisclaimerStyle + "\n";

              document.getElementById("log").innerText = out;
            } catch (innerErr) {
              document.getElementById("log").innerText = "Error reading results: " + innerErr;
            }
          }, 300);

        } catch (err) {
          document.getElementById("log").innerText = "Setup Error: " + err;
        }
      }, 1000);
    };
  </script>
</body>
</html>
