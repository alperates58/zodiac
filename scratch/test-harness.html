<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zodyak Atlası - Faz 4A-0 Test Paneli</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030610;
      --card-bg: rgba(255, 255, 255, 0.02);
      --border: rgba(255, 255, 255, 0.08);
      --gold: #d4af37;
      --gold-bright: #ffd166;
      --coral: #ef476f;
      --green: #06d6a0;
      --text: #cbd5e1;
      --text-muted: #64748b;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 2rem;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }
    .header h1 {
      font-family: 'Cinzel', serif;
      color: var(--gold-bright);
      margin: 0 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .header p {
      color: var(--text-muted);
      margin: 0;
      font-size: 1.1rem;
    }
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .summary-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .summary-card h3 {
      margin: 0 0 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .summary-card .value {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
    }
    .summary-card .value.pass {
      color: var(--green);
    }
    .summary-card .value.fail {
      color: var(--coral);
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.8rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: all 0.25s ease;
    }
    .tab-btn:hover, .tab-btn.active {
      background: var(--gold);
      color: #030610;
      border-color: var(--gold);
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(212,175,55,0.25);
    }
    .tab-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      display: none;
      backdrop-filter: blur(10px);
    }
    .tab-content.active {
      display: block;
    }
    .profile-info {
      margin-bottom: 2rem;
      border-left: 4px solid var(--gold);
      padding-left: 1rem;
    }
    .profile-info h2 {
      margin: 0 0 0.5rem;
      font-family: 'Cinzel', serif;
      color: #fff;
    }
    .profile-info p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }
    th {
      font-family: 'Cinzel', serif;
      color: var(--gold-bright);
      padding: 1rem 0.75rem;
      border-bottom: 2px solid var(--border);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    td {
      padding: 0.85rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #cbd5e1;
    }
    tr:hover td {
      background: rgba(255,255,255,0.01);
    }
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-badge.pass {
      background: rgba(6, 214, 160, 0.15);
      color: var(--green);
      border: 1px solid rgba(6, 214, 160, 0.3);
    }
    .status-badge.fail {
      background: rgba(239, 71, 111, 0.15);
      color: var(--coral);
      border: 1px solid rgba(239, 71, 111, 0.3);
    }
    .status-badge.ref-missing {
      background: rgba(100, 116, 139, 0.15);
      color: var(--text-muted);
      border: 1px solid rgba(100, 116, 139, 0.3);
    }
    .status-badge.not-independent {
      background: rgba(212, 175, 55, 0.15);
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }
    .diff-val {
      font-family: monospace;
      font-size: 0.85rem;
    }
    .diff-val.high-diff {
      color: var(--coral);
      font-weight: 600;
    }
    .diff-val.ok-diff {
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div id="debug-checkpoints" style="font-family:monospace; font-size:12px; color:#aaa; margin:20px; padding:10px; background:#222; display:block; white-space:pre-wrap;"></div>

  <div class="header">
    <h1>Zodyak Atlası - Faz 4A-0 Test Harness</h1>
    <p>Astronomy Engine (AstroAdapter) vs. Eski Motor (AstroCalc) & Referans Karşılaştırma</p>
  </div>

  <div class="summary-cards">
    <div class="summary-card">
      <h3>Toplam Test Profili</h3>
      <div class="value" id="totalProfiles">5</div>
    </div>
    <div class="summary-card">
      <h3>Doğrulanan Nokta Sayısı</h3>
      <div class="value" id="totalPoints">--</div>
    </div>
    <div class="summary-card">
      <h3>Yeni Motor Başarı Oranı</h3>
      <div class="value pass" id="successRate">--</div>
    </div>
    <div class="summary-card">
      <h3>Eski Motor Başarı Oranı</h3>
      <div class="value fail" id="oldSuccessRate">--</div>
    </div>
  </div>

  <div class="tabs" id="tabContainer"></div>
  <div id="contentContainer"></div>

  <!-- Script Entegrasyonları -->
  <script src="../astronomy.min.js"></script>
  <script src="../astro-adapter.js"></script>
  <script src="../astro-calc.js"></script>
  <script src="golden-dataset.js"></script>

  <script>
    window.onerror = function(msg, url, line, col, error) {
      const errDiv = document.createElement("div");
      errDiv.id = "browser-error";
      errDiv.style.color = "red";
      errDiv.style.padding = "20px";
      errDiv.style.background = "black";
      let stack = error && error.stack ? error.stack : "No stack trace available";
      errDiv.innerHTML = "ERROR: " + msg + "<br><pre style='color:#ff5555;'>" + stack + "</pre>";
      document.body.appendChild(errDiv);
    };

    function logCheckpoint(msg) {
      const dbg = document.getElementById("debug-checkpoints");
      if (dbg) {
        const d = document.createElement("div");
        d.textContent = msg;
        dbg.appendChild(d);
      }
    }

    if (typeof Astronomy === 'undefined' || typeof AstroAdapter === 'undefined' || typeof AstroCalc === 'undefined' || typeof GoldenDataset === 'undefined') {
      console.error("Kütüphaneler yüklenemedi! Dosya yollarını kontrol edin.");
    } else {
      runTests();
    }

    function formatDegree(longitude) {
      let norm = AstroAdapter.norm360(longitude);
      let signIdx = Math.floor(norm / 30);
      let signNames = ['Koç', 'Boğa', 'İkizler', 'Yengeç', 'Aslan', 'Başak', 'Terazi', 'Akrep', 'Yay', 'Oğlak', 'Kova', 'Balık'];
      let glyphs = ['♈', '♉', '♊', '♋', '♌', '♍', '♎', '♏', '♐', '♑', '♒', '♓'];
      let deg = norm - (signIdx * 30);
      let degInt = Math.floor(deg);
      let minInt = Math.floor((deg - degInt) * 60);
      return `${glyphs[signIdx]} ${signNames[signIdx]} ${degInt}° ${minInt.toString().padStart(2, '0')}' (${norm.toFixed(3)}°)`;
    }

    function getDiffString(deg1, deg2) {
      let diff = Math.abs(deg1 - deg2);
      if (diff > 180) diff = 360 - diff;
      let minTotal = diff * 60;
      let degInt = Math.floor(diff);
      let minInt = Math.round((diff - degInt) * 60);
      return `${degInt}° ${minInt.toString().padStart(2, '0')}' (${diff.toFixed(4)}°)`;
    }

    function runTests() {
      logCheckpoint("runTests starting...");
      const tabContainer = document.getElementById("tabContainer");
      const contentContainer = document.getElementById("contentContainer");
      
      let totalPointsCount = 0;
      let newPassCount = 0;
      let oldPassCount = 0;

      GoldenDataset.forEach((profile, idx) => {
        logCheckpoint("Profile " + profile.id + " (" + profile.name + ") starting...");
        // Tab Butonu Oluştur
        const btn = document.createElement("button");
        btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
        btn.textContent = profile.name;
        btn.onclick = () => switchTab(idx);
        tabContainer.appendChild(btn);

        logCheckpoint("Profile " + profile.id + ": Calculating jdOld...");
        const jdOld = AstroCalc.getJulianDate(profile.year, profile.month, profile.day, profile.hour, profile.minute, profile.tzOffset);
        logCheckpoint("Profile " + profile.id + ": jdOld = " + jdOld);
        
        logCheckpoint("Profile " + profile.id + ": Calculating jdNew...");
        const jdNew = AstroAdapter.getJulianDate(profile.year, profile.month, profile.day, profile.hour, profile.minute, profile.tzOffset);
        logCheckpoint("Profile " + profile.id + ": jdNew = " + jdNew);

        logCheckpoint("Profile " + profile.id + ": Calculating old planetary positions...");
        const oldPlanets = AstroCalc.getPlanetaryPositions(jdOld);
        logCheckpoint("Profile " + profile.id + ": Calculating old Sun position...");
        const oldSun = AstroCalc.getSunLongitude(jdOld);
        logCheckpoint("Profile " + profile.id + ": Calculating old Moon position...");
        const oldMoon = AstroCalc.getMoonLongitude(jdOld);
        logCheckpoint("Profile " + profile.id + ": Calculating old ASC...");
        const oldAsc = AstroCalc.getAscendant(jdOld, profile.lat, profile.lng);
        logCheckpoint("Profile " + profile.id + ": Calculating old MC...");
        const oldMc = AstroCalc.getMidheaven(jdOld, profile.lng);

        logCheckpoint("Profile " + profile.id + ": Calculating new planetary positions...");
        const newPlanets = AstroAdapter.getPlanetaryPositions(jdNew);
        logCheckpoint("Profile " + profile.id + ": Calculating new Sun position...");
        const newSun = AstroAdapter.getSunLongitude(jdNew);
        logCheckpoint("Profile " + profile.id + ": Calculating new Moon position...");
        const newMoon = AstroAdapter.getMoonLongitude(jdNew);
        logCheckpoint("Profile " + profile.id + ": Calculating new ASC...");
        const newAsc = AstroAdapter.getAscendant(jdNew, profile.lat, profile.lng);
        logCheckpoint("Profile " + profile.id + ": Calculating new MC...");
        const newMc = AstroAdapter.getMidheaven(jdNew, profile.lng);

        // Karşılaştırma Listesi
        const points = [
          { key: 'sun', name: 'Güneş', oldVal: oldSun, newVal: newSun, refVal: profile.reference.sun, type: 'planet' },
          { key: 'moon', name: 'Ay', oldVal: oldMoon, newVal: newMoon, refVal: profile.reference.moon, type: 'moon' },
          { key: 'mercury', name: 'Merkür', oldVal: oldPlanets.mercury, newVal: newPlanets.mercury, refVal: profile.reference.mercury, type: 'planet' },
          { key: 'venus', name: 'Venüs', oldVal: oldPlanets.venus, newVal: newPlanets.venus, refVal: profile.reference.venus, type: 'planet' },
          { key: 'mars', name: 'Mars', oldVal: oldPlanets.mars, newVal: newPlanets.mars, refVal: profile.reference.mars, type: 'planet' },
          { key: 'jupiter', name: 'Jüpiter', oldVal: oldPlanets.jupiter, newVal: newPlanets.jupiter, refVal: profile.reference.jupiter, type: 'planet' },
          { key: 'saturn', name: 'Satürn', oldVal: oldPlanets.saturn, newVal: newPlanets.saturn, refVal: profile.reference.saturn, type: 'planet' },
          { key: 'uranus', name: 'Uranüs', oldVal: oldPlanets.uranus, newVal: newPlanets.uranus, refVal: profile.reference.uranus, type: 'planet' },
          { key: 'neptune', name: 'Neptün', oldVal: oldPlanets.neptune, newVal: newPlanets.neptune, refVal: profile.reference.neptune, type: 'planet' },
          { key: 'pluto', name: 'Plüton', oldVal: oldPlanets.pluto || 0, newVal: newPlanets.pluto, refVal: profile.reference.pluto, type: 'planet' },
          { key: 'asc', name: 'ASC (Yükselen)', oldVal: oldAsc, newVal: newAsc, refVal: profile.reference.asc, type: 'asc_mc' },
          { key: 'mc', name: 'MC (Midheaven)', oldVal: oldMc, newVal: newMc, refVal: profile.reference.mc, type: 'asc_mc' }
        ];

        // Panel İçeriğini Oluştur
        const contentDiv = document.createElement("div");
        contentDiv.id = `tabContent-${idx}`;
        contentDiv.className = `tab-content ${idx === 0 ? 'active' : ''}`;

        let rowsHtml = "";
        points.forEach(pt => {
          totalPointsCount++;
          
          // Sapma Tolerans Kontrolü
          let tolerance = 0.02; // Planet ve ASC/MC için 0.02°
          if (pt.type === 'moon') tolerance = 0.03; // Ay için 0.03°

          // Eski vs Yeni Farkı
          let deltaDiff = Math.abs(pt.oldVal - pt.newVal);
          if (deltaDiff > 180) deltaDiff = 360 - deltaDiff;

          // Retro Durumunu Kontrol Et
          let isNewRetro = AstroAdapter.isPlanetRetrograde(pt.key, jdNew);
          let refRetro = profile.reference && profile.reference.retros ? profile.reference.retros.includes(pt.key) : false;
          let retroText = (isNewRetro ? "(R)" : "");
          let refRetroText = (refRetro ? "(R)" : "");

          // Durum Kriterleri
          let isRefMissing = (pt.refVal === null || pt.refVal === undefined || profile.verificationStatus === "missing_reference");
          let isNotIndependent = (profile.isIndependent === false);

          let statusText = "";
          let statusClass = "";
          let diffText = "";
          let newDiff = 0;

          if (isRefMissing) {
            statusText = "REFERANS YOK";
            statusClass = "ref-missing";
            diffText = "DOĞRULANMADI";
          } else if (isNotIndependent) {
            statusText = "BAĞIMSIZ DEĞİL";
            statusClass = "not-independent";
            diffText = "BAĞIMSIZ DEĞİL";
          } else {
            // Yeni Motor vs Referans Sapması
            newDiff = Math.abs(pt.newVal - pt.refVal);
            if (newDiff > 180) newDiff = 360 - newDiff;
            const isNewPass = newDiff <= tolerance;
            if (isNewPass) newPassCount++;

            // Eski Motor vs Referans Sapması
            let oldDiff = Math.abs(pt.oldVal - pt.refVal);
            if (oldDiff > 180) oldDiff = 360 - oldDiff;
            const isOldPass = oldDiff <= tolerance;
            if (isOldPass) oldPassCount++;

            statusText = isNewPass ? "GEÇTİ" : "HATA";
            statusClass = isNewPass ? "pass" : "fail";
            diffText = getDiffString(pt.newVal, pt.refVal);
          }

          rowsHtml += `
            <tr>
              <td style="font-weight:600;">${pt.name}</td>
              <td class="diff-val">${formatDegree(pt.oldVal)}</td>
              <td class="diff-val" style="color:#fff;">${formatDegree(pt.newVal)} ${retroText}</td>
              <td class="diff-val" style="color:var(--gold);">${isRefMissing ? "YOK" : formatDegree(pt.refVal) + " " + refRetroText}</td>
              <td class="diff-val ${deltaDiff > 0.05 ? 'high-diff' : 'ok-diff'}">${getDiffString(pt.oldVal, pt.newVal)}</td>
              <td class="diff-val ${(!isRefMissing && !isNotIndependent && newDiff > 0.05) ? 'high-diff' : 'ok-diff'}">${diffText}</td>
              <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            </tr>
          `;
        });

        contentDiv.innerHTML = `
          <div class="profile-info">
            <h2>${profile.name} (${profile.city})</h2>
            <p><strong>Girdi Parametreleri:</strong> ${profile.day}.${profile.month}.${profile.year} ${profile.hour}:${profile.minute} (Offset: ${profile.tzOffset}, IANA: ${profile.ianaTimezone})</p>
            <p><strong>Test Senaryosu:</strong> ${profile.scenario}</p>
          </div>
          <table>
            <thead>
              <tr>
                <th>Gök Cismi</th>
                <th>Eski Motor (AstroCalc)</th>
                <th>Yeni Motor (AstroAdapter)</th>
                <th>Referans Sonuç (Ref)</th>
                <th>Eski vs Yeni Farkı</th>
                <th>Yeni vs Referans Sapması</th>
                <th>Durum</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        `;
        contentContainer.appendChild(contentDiv);
      });

      // Özet Kartlarını Güncelle
      document.getElementById("totalPoints").textContent = totalPointsCount;
      
      const newSuccessRateVal = (newPassCount / totalPointsCount) * 100;
      const oldSuccessRateVal = (oldPassCount / totalPointsCount) * 100;
      
      document.getElementById("successRate").textContent = `%${newSuccessRateVal.toFixed(1)}`;
      document.getElementById("oldSuccessRate").textContent = `%${oldSuccessRateVal.toFixed(1)}`;

      // Dump raw results in JSON for automated analysis
      let resultsObj = {};
      GoldenDataset.forEach((profile, idx) => {
        const jdNew = AstroAdapter.getJulianDate(profile.year, profile.month, profile.day, profile.hour, profile.minute, profile.tzOffset);
        const newPlanets = AstroAdapter.getPlanetaryPositions(jdNew);
        const newSun = AstroAdapter.getSunLongitude(jdNew);
        const newMoon = AstroAdapter.getMoonLongitude(jdNew);
        const newAsc = AstroAdapter.getAscendant(jdNew, profile.lat, profile.lng);
        const newMc = AstroAdapter.getMidheaven(jdNew, profile.lng);
        
        let retrosList = [];
        ['mercury', 'venus', 'mars', 'jupiter', 'saturn', 'uranus', 'neptune', 'pluto'].forEach(p => {
          if (AstroAdapter.isPlanetRetrograde(p, jdNew)) {
            retrosList.push(p);
          }
        });

        resultsObj[profile.id] = {
          sun: newSun,
          moon: newMoon,
          mercury: newPlanets.mercury,
          venus: newPlanets.venus,
          mars: newPlanets.mars,
          jupiter: newPlanets.jupiter,
          saturn: newPlanets.saturn,
          uranus: newPlanets.uranus,
          neptune: newPlanets.neptune,
          pluto: newPlanets.pluto,
          asc: newAsc,
          mc: newMc,
          retros: retrosList
        };
      });
      const preEl = document.createElement("pre");
      preEl.id = "raw-results";
      preEl.style.display = "block";
      preEl.style.color = "#8b949e";
      preEl.style.background = "#0d1117";
      preEl.style.padding = "1rem";
      preEl.style.marginTop = "2rem";
      preEl.style.border = "1px solid var(--border)";
      preEl.textContent = "RESULTS_JSON_START:" + JSON.stringify(resultsObj) + ":RESULTS_JSON_END";
      document.body.appendChild(preEl);
    }

    function switchTab(index) {
      document.querySelectorAll(".tab-btn").forEach((btn, idx) => {
        btn.classList.toggle("active", idx === index);
      });
      document.querySelectorAll(".tab-content").forEach((content, idx) => {
        content.classList.toggle("active", idx === index);
      });
    }
  </script>
</body>
</html>
