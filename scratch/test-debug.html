<!DOCTYPE html>
<html>
<body>
<div id="log" style="font-family:monospace; white-space:pre-wrap;"></div>
<script src="../astronomy.min.js"></script>
<script>
try {
  var time = new Astronomy.AstroTime(-5312.979166666667);
  var out = "";
  
  var moon = Astronomy.EclipticGeoMoon(time);
  out += "Moon keys: " + Object.keys(moon).join(", ") + "\n";
  out += "Moon values: lat=" + moon.lat + ", lon=" + moon.lon + ", dist=" + moon.dist + "\n\n";
  
  var vec = Astronomy.GeoVector(Astronomy.Body.Mercury, time, true);
  var coords = Astronomy.Ecliptic(vec);
  out += "Ecliptic keys: " + Object.keys(coords).join(", ") + "\n";
  out += "Ecliptic values: lat=" + coords.lat + ", lon=" + coords.lon + ", dist=" + coords.dist + "\n";
  
  // Check if properties are different
  if (coords.elon !== undefined) out += "Ecliptic has elon: " + coords.elon + "\n";
  if (coords.elat !== undefined) out += "Ecliptic has elat: " + coords.elat + "\n";
  
  document.getElementById("log").innerText = out;
} catch (e) {
  document.getElementById("log").innerText = "Error: " + e;
}
</script>
</body>
</html>
